name: Deploy GitHub Pages

on:
  push:
    branches:
    - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Pages
      uses: actions/configure-pages@v4
    - name: Build
      run: |
        npm i
        npm run build
        cp ./dist/browser/index.html ./dist/404.html
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
